name: CI/CD - Skin Cancer Classification

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: skin-cancer-api

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ \
            -v --tb=short \
            --cov=src --cov-report=term-missing

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run container test
        run: |
          docker compose up -d --build
          sleep 20
          curl -f http://localhost:8000/health || exit 1
          docker compose down

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install security tools
        run: |
          pip install safety bandit
          safety check -r requirements.txt || true
          bandit -r src/ || true

  cd:
    name: CD - Build & Push + Deploy (Test Runtime)
    runs-on: ubuntu-latest
    needs: [test, docker, security]

    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR (using PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set tag (prod / staging)
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy & Health Check
        run: |
          echo "🚀 Deploying..."

          docker run -d -p 8000:8000 \
            ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}

          echo "⏳ Waiting for service..."

          for i in {1..12}; do
            if curl -f http://localhost:8000/health; then
              echo "✅ Service is up"
              docker stop $(docker ps -q)
              exit 0
            fi

            echo "Retry $i..."
            sleep 5
          done

          echo "❌ Service failed. Showing logs:"
          docker logs $(docker ps -q)

          docker stop $(docker ps -q)

          exit 1
